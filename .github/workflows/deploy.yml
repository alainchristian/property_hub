name: Test, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: property_mgmt_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api migration:run
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: property_mgmt_test
          DB_USER: admin
          DB_PASSWORD: admin
          JWT_SECRET: ci_test_secret_at_least_32_chars_abc
          JWT_REFRESH_SECRET: ci_refresh_secret_at_least_32_chars_xyz
      - run: pnpm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # The deploy target is a Windows Server with OpenSSH installed.
          # Commands run in PowerShell via SSH.
          script: |
            cd C:\property-management
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm migration:run
            pnpm build
            pm2 reload ecosystem.config.js --env production
            Write-Host "Deploy complete at $(Get-Date)"
